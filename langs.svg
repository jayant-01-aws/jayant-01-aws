<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" role="img" aria-label="Animated local programming language statistics card">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#18091f"/><stop offset=".55" stop-color="#35103f"/><stop offset="1" stop-color="#120817"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ff4fae"/><stop offset=".5" stop-color="#d86dff"/><stop offset="1" stop-color="#8e5cff"/></linearGradient>
</defs>
<style>.t{font-family:Inter,Arial,sans-serif}.m{font-family:Consolas,"Liberation Mono",monospace}</style>
<rect width="720" height="430" rx="28" fill="url(#bg)" stroke="#b95bb8" stroke-opacity=".65" stroke-width="2"/>
<text x="34" y="48" class="m" font-size="15" fill="#f2b5e8" letter-spacing="2">LANGUAGES // BUILD STACK</text>
<g class="t" font-size="15">
<text x="42" y="100" fill="#fff">Java</text><text x="675" y="100" text-anchor="end" class="m" font-size="13" fill="#ff9bd8">32%</text>
<rect x="42" y="112" width="636" height="18" rx="9" fill="#29142f"/><rect x="42" y="112" width="0" height="18" rx="9" fill="url(#bar)"><animate attributeName="width" from="0" to="203.5" dur="1.2s" begin=".2s" fill="freeze"/></rect>
<text x="42" y="165" fill="#fff">JavaScript</text><text x="675" y="165" text-anchor="end" class="m" font-size="13" fill="#ff9bd8">25%</text>
<rect x="42" y="177" width="636" height="18" rx="9" fill="#29142f"/><rect x="42" y="177" width="0" height="18" rx="9" fill="url(#bar)"><animate attributeName="width" from="0" to="159" dur="1.2s" begin=".45s" fill="freeze"/></rect>
<text x="42" y="230" fill="#fff">PHP</text><text x="675" y="230" text-anchor="end" class="m" font-size="13" fill="#ff9bd8">18%</text>
<rect x="42" y="242" width="636" height="18" rx="9" fill="#29142f"/><rect x="42" y="242" width="0" height="18" rx="9" fill="url(#bar)"><animate attributeName="width" from="0" to="114.5" dur="1.2s" begin=".7s" fill="freeze"/></rect>
<text x="42" y="295" fill="#fff">Python</text><text x="675" y="295" text-anchor="end" class="m" font-size="13" fill="#ff9bd8">15%</text>
<rect x="42" y="307" width="636" height="18" rx="9" fill="#29142f"/><rect x="42" y="307" width="0" height="18" rx="9" fill="url(#bar)"><animate attributeName="width" from="0" to="95.4" dur="1.2s" begin=".95s" fill="freeze"/></rect>
<text x="42" y="360" fill="#fff">C / C++ / C# / SQL</text><text x="675" y="360" text-anchor="end" class="m" font-size="13" fill="#ff9bd8">10%</text>
<rect x="42" y="372" width="636" height="18" rx="9" fill="#29142f"/><rect x="42" y="372" width="0" height="18" rx="9" fill="url(#bar)"><animate attributeName="width" from="0" to="63.6" dur="1.2s" begin="1.2s" fill="freeze"/></rect>
</g>
</svg>