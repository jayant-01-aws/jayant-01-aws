<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" role="img" aria-label="Animated local developer trophy card">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#18091f"/><stop offset=".55" stop-color="#35103f"/><stop offset="1" stop-color="#120817"/></linearGradient>
<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffd36e"/><stop offset=".5" stop-color="#ff86d3"/><stop offset="1" stop-color="#9c6bff"/></linearGradient>
<linearGradient id="shine"><stop stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".75"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>.t{font-family:Inter,Arial,sans-serif}.m{font-family:Consolas,"Liberation Mono",monospace}</style>
<rect width="720" height="430" rx="28" fill="url(#bg)" stroke="#b95bb8" stroke-opacity=".65" stroke-width="2"/>
<text x="34" y="48" class="m" font-size="15" fill="#f2b5e8" letter-spacing="2">TROPHIES // ACHIEVEMENTS</text>
<g transform="translate(32 78)">
<g transform="translate(0 0)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".2s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin=".2s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">🏆</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">PROJECT BUILDER</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">8+ SHIPPED</text></g>
<g transform="translate(226 0)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".5s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin=".5s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">⚡</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">DSA GRINDER</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">LEARNING MODE</text></g>
<g transform="translate(452 0)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin=".8s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin=".8s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">💻</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">FULL-STACK</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">BUILDING</text></g>
<g transform="translate(0 150)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin="1.1s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">🤖</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">AI EXPLORER</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">OCR + VISION</text></g>
<g transform="translate(226 150)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin="1.4s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">🚀</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">SHIP IT</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">BUILD • TEST • DEPLOY</text></g>
<g transform="translate(452 150)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.7s" dur=".4s" fill="freeze"/><animateTransform attributeName="transform" type="scale" from=".5" to="1" begin="1.7s" dur=".55s" fill="freeze"/>
<rect width="200" height="125" rx="18" fill="#24122c" stroke="#9d5a9c"/><text x="100" y="48" text-anchor="middle" font-size="36" fill="url(#gold)" filter="url(#glow)">⭐</text><text x="100" y="80" text-anchor="middle" class="t" font-size="15" fill="#fff">KEEP GROWING</text><text x="100" y="103" text-anchor="middle" class="m" font-size="11" fill="#ff9bd8">LEVEL UP</text></g>
</g>
<rect x="-150" y="70" width="100" height="360" fill="url(#shine)" opacity=".3" transform="skewX(-18)"><animate attributeName="x" values="-250;850" dur="5s" begin="2s" repeatCount="indefinite"/></rect>
</svg>